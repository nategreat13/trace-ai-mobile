name: Deal Classifier Audit

# Runs every other Monday at 9am MT (3pm UTC).
# Also runnable manually from the GitHub Actions tab (useful after a big
# batch of new deals is added and you don't want to wait for the schedule).
on:
  schedule:
    - cron: "0 15 * * 1/2"   # every 2 weeks on Monday, 9am MT
  workflow_dispatch:          # manual trigger

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      issues: write   # needed to open an issue if unmatched destinations are found

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run deal classifier audit
        id: audit
        run: |
          OUTPUT=$(node scripts/audit-deal-classifier.mjs 2>&1)
          echo "$OUTPUT"

          # Extract the unmatched count from the summary line
          UNMATCHED=$(echo "$OUTPUT" | grep "Unmatched (need adding)" | grep -oP '\d+(?= \()' | head -1)
          UNMATCHED=${UNMATCHED:-0}

          echo "unmatched=$UNMATCHED" >> $GITHUB_OUTPUT

          # Save full output for use in the issue body
          {
            echo "audit_output<<EOF"
            echo "$OUTPUT"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Open GitHub issue if destinations are unclassified
        if: steps.audit.outputs.unmatched != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const unmatched = '${{ steps.audit.outputs.unmatched }}';
            const auditOutput = `${{ steps.audit.outputs.audit_output }}`;

            // Check if there's already an open issue for this
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'deal-classifier',
            });

            if (existing.data.length > 0) {
              // Update the existing issue with fresh data instead of opening a duplicate
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `🔄 **Updated audit (${new Date().toDateString()})** — ${unmatched} destination(s) still unclassified.\n\n\`\`\`\n${auditOutput}\n\`\`\``,
              });
              console.log(`Updated existing issue #${existing.data[0].number}`);
            } else {
              // Open a new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🗺️ Deal classifier: ${unmatched} new destination(s) need categorizing`,
                labels: ['deal-classifier'],
                body: [
                  `The scheduled deal classifier audit found **${unmatched} destination(s)** in the live deal feed that aren't matched by any keyword in \`dealClassifier.ts\`.`,
                  ``,
                  `These deals appear at the **back of the deck** for users who have set deal-type preferences, so they're effectively hidden until a user has swiped everything else.`,
                  ``,
                  `## What to do`,
                  `1. Look at the unmatched list below`,
                  `2. Add each destination to the right keyword array in \`projects/app/src/lib/dealClassifier.ts\``,
                  `3. Run \`node scripts/audit-deal-classifier.mjs\` locally to confirm 0 unmatched`,
                  `4. Commit, push, and ship an OTA`,
                  ``,
                  `## Audit output`,
                  `\`\`\``,
                  auditOutput,
                  `\`\`\``,
                ].join('\n'),
              });
              console.log('Opened new issue');
            }

      - name: All good
        if: steps.audit.outputs.unmatched == '0'
        run: echo "✅ All destinations classified — nothing to add."
